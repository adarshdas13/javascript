<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            width: 100%;
            height: 100%;  
        }
        #main{
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            color: white;

            height: 100%;
        }
        input{
            display:none
        }
        #btn{
            padding: 12px 20px;
            background-color: rgb(7, 104, 107);

        }
        #main #btn:hover{
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <div id="main">
        <input type="file" id="fileinp">
        <div id="btn">Upload file</div>
    </div>
    <script src="script.js"></script>

</html>
