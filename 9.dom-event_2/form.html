<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            width: 100%;
            height: 100%;
            background: #222;
        }
        input{
            display: block;
        }
        #main{
            padding: 20px;
            width: 100%;
            height: 100%;
        }
        .card{
            max-width: 300px;
            margin-top: 40px;
            display: inline-block;
            padding: 20px;
            color: white;
            border: 1.5px solid darkgrey;
            border-radius: 10px;
        }
        .profile{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
        }
        .card p{
            font-size: 12px;
            margin-top: 10px;
        }
        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="profilepic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="job">
            <input type="text" placeholder="title">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
